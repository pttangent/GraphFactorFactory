handler:
  class: DataHandlerLP
  module_path: qlib.data.dataset.handler
  kwargs:
    instruments: null
    data_loader:
      class: CanonicalQlibDataLoader
      module_path: graphfactorfactory.infrastructure.qlib_loader
      kwargs:
        node_factor_path: /path/to/node_factors_5m
        graph_store_root: /path/to/graph_store
        config_path: configs/default.yaml
        include_graph: true
    infer_processors:
      - class: Fillna
        kwargs:
          fields_group: feature
      - class: CSZScoreNorm
        kwargs:
          fields_group: feature
    learn_processors:
      - class: DropnaLabel
